<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Mentor Digital - Gerenciador de Rotinas</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <header>
    <div class="container header-content">
      <div class="header-top">
        <div class="logo">
          <span class="logo-icon">&#9670;</span>
          <h1>Mentor Digital</h1>
        </div>
        <button class="btn-customize" id="btnCustomize">Personalizar</button>
      </div>
      <p class="subtitle">Gerencie suas rotinas e acompanhe seu progresso</p>
    </div>
  </header>

  <main class="container">
    <section class="dashboard">
      <div class="card stat-card" data-stat="total">
        <span class="stat-number" id="statTotal">0</span>
        <span class="stat-label">Total</span>
      </div>
      <div class="card stat-card" data-stat="pendente">
        <span class="stat-number" id="statPendente">0</span>
        <span class="stat-label">Pendentes</span>
      </div>
      <div class="card stat-card" data-stat="concluida">
        <span class="stat-number" id="statConcluida">0</span>
        <span class="stat-label">Concluídas</span>
      </div>
      <div class="card stat-card" data-stat="progresso">
        <span class="stat-number" id="statProgresso">0%</span>
        <span class="stat-label">Progresso</span>
      </div>
    </section>

    <section class="customize-panel card customize-hidden" id="customizePanel">
      <h2>Personalizar <button class="close-customize" id="closeCustomize">&#10005;</button></h2>
      <div class="customize-section">
        <label>Tema</label>
        <div class="theme-options" id="themeOptions">
          <button class="theme-btn active" data-theme="padrao">
            <span>Padrão</span>
            <span class="theme-preview">
              <span style="background:#f0f2f5"></span>
              <span style="background:#6c5ce7"></span>
              <span style="background:#ffffff"></span>
            </span>
          </button>
          <button class="theme-btn" data-theme="personalizado">
            <span>Escuro + Marrom</span>
            <span class="theme-preview">
              <span style="background:#000000"></span>
              <span style="background:#8B4513"></span>
              <span style="background:#D4AF37"></span>
            </span>
          </button>
        </div>
      </div>
      <div class="customize-section">
        <label>Fonte</label>
        <div class="font-options" id="fontOptions">
          <button class="font-btn active" data-font="padrao">Sistema <span class="font-name">Padrão</span></button>
          <button class="font-btn" data-font="serif">Serif <span class="font-name" style="font-family:Georgia,serif">Georgia / Times</span></button>
          <button class="font-btn" data-font="arial">Arial <span class="font-name" style="font-family:Arial,sans-serif;font-weight:700">Arial Bold</span></button>
        </div>
      </div>
    </section>

    <section class="card telegram-section" id="telegramSection">
      <h2>Telegram</h2>
      <div class="telegram-status" id="telegramStatus">
        <span class="status-dot offline"></span>
        <span>Desconectado</span>
      </div>
      <div class="form-row">
        <div class="form-group">
          <label for="telegramChatId">Chat ID</label>
          <input type="text" id="telegramChatId" placeholder="Ex: 5332497916">
        </div>
      </div>
      <div class="form-row">
        <button class="btn btn-primary" id="btnTestTelegram">Testar Conexão</button>
        <button class="btn btn-secondary" id="btnSaveTelegram">Salvar</button>
      </div>
    </section>

    <section class="form-section card">
      <h2>Nova Tarefa</h2>
      <form id="taskForm">
        <div class="form-row">
          <div class="form-group">
            <label for="taskTitle">Título</label>
            <input type="text" id="taskTitle" placeholder="Ex: Estudar revisão semanal" required>
          </div>
          <div class="form-group">
            <label for="taskCategory">Categoria</label>
            <select id="taskCategory">
              <option value="diaria">Diária</option>
              <option value="semanal">Semanal</option>
              <option value="mensal">Mensal</option>
            </select>
          </div>
          <div class="form-group">
            <label for="taskPriority">Prioridade</label>
            <select id="taskPriority">
              <option value="alta">Alta</option>
              <option value="media" selected>Média</option>
              <option value="baixa">Baixa</option>
            </select>
          </div>
        </div>
        <div class="form-row">
          <div class="form-group full-width">
            <label for="taskDesc">Descrição (opcional)</label>
            <input type="text" id="taskDesc" placeholder="Detalhes da tarefa...">
          </div>
        </div>
        <button type="submit" class="btn btn-primary">Adicionar Tarefa</button>
      </form>
    </section>

    <section class="filters">
      <div class="filter-tabs" id="filterTabs">
        <button class="filter-btn active" data-filter="todas">Todas</button>
        <button class="filter-btn" data-filter="diaria">Diárias</button>
        <button class="filter-btn" data-filter="semanal">Semanais</button>
        <button class="filter-btn" data-filter="mensal">Mensais</button>
      </div>
      <div class="search-box">
        <input type="text" id="searchInput" placeholder="Buscar tarefas...">
      </div>
    </section>

    <section class="task-list" id="taskList">
      <p class="empty-msg">Nenhuma tarefa encontrada. Crie sua primeira tarefa acima!</p>
    </section>

    <section class="cmd-bar card">
      <div class="cmd-input-wrap">
        <input type="text" id="cmdInput" placeholder="Digite / para comandos..." autocomplete="off">
        <button class="btn btn-primary cmd-send" id="cmdSend">&#10148;</button>
      </div>
      <div class="cmd-suggestions" id="cmdSuggestions"></div>
    </section>
  </main>

  <div class="modal-overlay" id="editModal">
    <div class="modal card">
      <h2>Editar Tarefa</h2>
      <form id="editForm">
        <input type="hidden" id="editId">
        <div class="form-row">
          <div class="form-group">
            <label for="editTitle">Título</label>
            <input type="text" id="editTitle" required>
          </div>
          <div class="form-group">
            <label for="editCategory">Categoria</label>
            <select id="editCategory">
              <option value="diaria">Diária</option>
              <option value="semanal">Semanal</option>
              <option value="mensal">Mensal</option>
            </select>
          </div>
          <div class="form-group">
            <label for="editPriority">Prioridade</label>
            <select id="editPriority">
              <option value="alta">Alta</option>
              <option value="media">Média</option>
              <option value="baixa">Baixa</option>
            </select>
          </div>
        </div>
        <div class="form-row">
          <div class="form-group full-width">
            <label for="editDesc">Descrição</label>
            <input type="text" id="editDesc">
          </div>
        </div>
        <div class="modal-actions">
          <button type="button" class="btn btn-secondary" id="cancelEdit">Cancelar</button>
          <button type="submit" class="btn btn-primary">Salvar</button>
        </div>
      </form>
    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
