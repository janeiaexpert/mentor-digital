<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Mentor Digital - Entrar</title>
  <link rel="stylesheet" href="style.css">
</head>
<body class="login-body">
  <main class="login-container">
    <div class="login-card card">
      <div class="login-logo">
        <span class="logo-icon">&#9670;</span>
        <h1>Mentor Digital</h1>
      </div>
      <p class="login-subtitle">Gerencie suas rotinas de qualquer lugar</p>

      <div class="login-tabs">
        <button class="login-tab active" id="tabLogin">Entrar</button>
        <button class="login-tab" id="tabRegister">Cadastrar</button>
      </div>

      <form id="loginForm">
        <div class="form-group">
          <label for="loginEmail">Email</label>
          <input type="email" id="loginEmail" placeholder="seu@email.com" required>
        </div>
        <div class="form-group">
          <label for="loginSenha">Senha</label>
          <input type="password" id="loginSenha" placeholder="minimo 4 caracteres" required>
        </div>
        <p class="login-error" id="loginError"></p>
        <button type="submit" class="btn btn-primary btn-full">Entrar</button>
      </form>

      <form id="registerForm" class="hidden">
        <div class="form-group">
          <label for="regNome">Nome</label>
          <input type="text" id="regNome" placeholder="Seu nome" required>
        </div>
        <div class="form-group">
          <label for="regEmail">Email</label>
          <input type="email" id="regEmail" placeholder="seu@email.com" required>
        </div>
        <div class="form-group">
          <label for="regSenha">Senha</label>
          <input type="password" id="regSenha" placeholder="minimo 4 caracteres" required>
        </div>
        <p class="login-error" id="registerError"></p>
        <button type="submit" class="btn btn-primary btn-full">Cadastrar</button>
      </form>
    </div>
  </main>

  <script>
    const API = '';
    const formLogin = document.getElementById('loginForm');
    const formRegister = document.getElementById('registerForm');
    const tabLogin = document.getElementById('tabLogin');
    const tabRegister = document.getElementById('tabRegister');
    const loginError = document.getElementById('loginError');
    const registerError = document.getElementById('registerError');

    tabLogin.addEventListener('click', () => {
      tabLogin.classList.add('active');
      tabRegister.classList.remove('active');
      formLogin.classList.remove('hidden');
      formRegister.classList.add('hidden');
      loginError.textContent = '';
    });

    tabRegister.addEventListener('click', () => {
      tabRegister.classList.add('active');
      tabLogin.classList.remove('active');
      formRegister.classList.remove('hidden');
      formLogin.classList.add('hidden');
      registerError.textContent = '';
    });

    async function req(url, data) {
      const res = await fetch(API + url, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(data)
      });
      const json = await res.json();
      if (!res.ok) throw new Error(json.erro || 'Erro');
      return json;
    }

    formLogin.addEventListener('submit', async (e) => {
      e.preventDefault();
      loginError.textContent = '';
      try {
        const data = await req('/api/login', {
          email: document.getElementById('loginEmail').value.trim(),
          senha: document.getElementById('loginSenha').value
        });
        localStorage.setItem('token', data.token);
        localStorage.setItem('usuario', JSON.stringify(data.usuario));
        window.location.href = '/';
      } catch (err) {
        loginError.textContent = err.message;
      }
    });

    formRegister.addEventListener('submit', async (e) => {
      e.preventDefault();
      registerError.textContent = '';
      try {
        const data = await req('/api/registrar', {
          nome: document.getElementById('regNome').value.trim(),
          email: document.getElementById('regEmail').value.trim(),
          senha: document.getElementById('regSenha').value
        });
        localStorage.setItem('token', data.token);
        localStorage.setItem('usuario', JSON.stringify(data.usuario));
        window.location.href = '/';
      } catch (err) {
        registerError.textContent = err.message;
      }
    });

    if (localStorage.getItem('token')) {
      window.location.href = '/';
    }
  </script>
</body>
</html>
